# ?? WebAuthn / Passkey configuration ?????????????????????????????????????????
quarkus.webauthn.relying-party.id=localhost
quarkus.webauthn.relying-party.name=Passkey Demo
# Enable the POST /q/webauthn/register and /q/webauthn/login endpoints
# (both default to false and MUST be explicitly enabled)
quarkus.webauthn.enable-registration-endpoint=true
quarkus.webauthn.enable-login-endpoint=true
# Redirect unauthenticated users to /login
quarkus.webauthn.login-page=/login
# ?? H2 in-memory datasource (satisfies the JDBC H2 extension) ?????????????????
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:passkeydb;DB_CLOSE_DELAY=-1
# ?? Dev mode HTTP port ?????????????????????????????????????????????????????????
%dev.quarkus.http.port=8080

